<!DOCTYPE html>
<html>
<head>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f0f0f0;
        }

        h1 {
            color: #2c3e50;

        button {
            padding: 10px 20px;

<body>

        }
